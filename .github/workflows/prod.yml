name: CD — prod build

# Triggers the dbt Cloud production build (refreshes gold.marts in the warehouse) and waits for it.
# Deploying the docs site is no longer this workflow's job — pages.yml redeploys (with the fresh
# docs) via a workflow_run hook once this completes. See .github/workflows/pages.yml.

on:
  push:
    branches: [main]
    paths:
      - 'fintech_dbt/**'
  workflow_dispatch:

concurrency:
  group: prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  DBT_CLOUD_HOST: hf168.us1.dbt.com
  DBT_CLOUD_ACCOUNT_ID: "70506183132386"
  DBT_CLOUD_JOB_ID: "70506183132667"

jobs:
  prod-build:
    name: dbt Cloud prod build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dbt Cloud Prod build job
        id: trigger
        env:
          DBT_CLOUD_API_TOKEN: ${{ secrets.DBT_CLOUD_API_TOKEN }}
        run: |
          run_id=$(curl -fsS -X POST \
            "https://${DBT_CLOUD_HOST}/api/v2/accounts/${DBT_CLOUD_ACCOUNT_ID}/jobs/${DBT_CLOUD_JOB_ID}/run/" \
            -H "Authorization: Token ${DBT_CLOUD_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"cause\": \"GitHub Actions: merge ${GITHUB_SHA} to main\"}" \
            | jq -r '.data.id')
          echo "Triggered run: $run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Poll run to completion
        env:
          DBT_CLOUD_API_TOKEN: ${{ secrets.DBT_CLOUD_API_TOKEN }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          while true; do
            status=$(curl -fsS \
              "https://${DBT_CLOUD_HOST}/api/v2/accounts/${DBT_CLOUD_ACCOUNT_ID}/runs/${RUN_ID}/" \
              -H "Authorization: Token ${DBT_CLOUD_API_TOKEN}" \
              | jq -r '.data.status')
            echo "run ${RUN_ID} status=${status}"
            if [ "$status" -ge 10 ]; then break; fi
            sleep 15
          done
          if [ "$status" -ne 10 ]; then
            echo "::error::dbt Cloud run ${RUN_ID} ended with status ${status} (10=success, 20=error, 30=cancelled)"
            exit 1
          fi
          echo "Prod build succeeded (run ${RUN_ID})"
