name: BI refresh

on:
  workflow_dispatch:

concurrency:
  group: bi-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Serve gold marts to Google Sheet
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Write service-account key to a temp file
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: printf '%s' "$GOOGLE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Run reverse-ETL (gold marts → Sheet)
        working-directory: fintech_datalake/scripts
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
        run: uv run python serve_to_sheets.py